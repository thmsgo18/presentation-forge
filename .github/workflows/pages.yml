name: Deploy demo to Pages

# Publishes the bundled demo deck (template/index.html) as a live, clickable
# example at https://thmsgo18.github.io/presentation-forge/.
# Requires: repo Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble the demo site
        run: |
          mkdir -p _site
          cp template/index.html _site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
