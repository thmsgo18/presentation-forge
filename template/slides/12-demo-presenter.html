<!-- 12 - Switching into presenter mode -->
<section class="slide">
  <p class="context-badge">Mode switch</p>
  <h2 class="title">One key opens a presenter sidebar.</h2>
  <div class="switch switch--presenter">
    <div class="switch__main">
      <button class="switch__btn" aria-hidden="true">
        <span class="icon-a"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="13" rx="2"></rect><path d="M8 21h8M12 16v5"/><path d="M7 10h1m3-3v6m3-4v4"/></svg></span>
        <span class="icon-b"><svg viewBox="0 0 24 24"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg></span>
      </button>
      <span class="switch__cursor"></span>
    </div>
    <div class="switch__sidebar">
      <div class="switch__sidebar-inner">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
  </div>
  <p class="lead muted">Press <code>p</code>. Notes, the timer and the next slide appear here, never on the screen behind you.</p>
  <div class="footer"><span>Presentation Forge</span><span>On stage</span></div>
  <aside class="notes">
    <p>The audience window stays full screen and clean; the presenter sidebar is local, on this machine only.</p>
  </aside>
</section>
