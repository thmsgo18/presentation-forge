<!-- 14 - Full screen switch -->
<section class="slide">
  <p class="context-badge">Full screen</p>
  <h2 class="title">Distraction-free for the room.</h2>
  <div class="switch switch--fullscreen">
    <div class="switch__rail"></div>
    <div class="switch__main">
      <span class="switch__toast">Press Esc to exit full screen</span>
      <button class="switch__btn" aria-hidden="true">
        <span class="icon-a"><svg viewBox="0 0 24 24"><path d="M9 4H4v5M15 4h5v5M9 20H4v-5M15 20h5v-5"/></svg></span>
        <span class="icon-b"><svg viewBox="0 0 24 24"><path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5"/></svg></span>
      </button>
      <span class="switch__cursor"></span>
    </div>
  </div>
  <p class="lead muted">The rail and the chrome fade away. Only the slide stays, for a projector or a back row.</p>
  <div class="footer"><span>Presentation Forge</span><span>On stage</span></div>
  <aside class="notes">
    <p>Same key, <code>f</code>, leaves full screen too. Controls fade after a few idle seconds and return on the first move.</p>
  </aside>
</section>
